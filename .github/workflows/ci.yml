name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "1.94.1"
  ANCHOR_VERSION: "1.0.0-rc.5"
  SOLANA_VERSION: "v3.0.0"

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Stage 1: Lint
  # -----------------------------------------------------------------------

  lint:
    name: Lint (rustfmt + clippy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # -----------------------------------------------------------------------
  # Stage 2: Test (depends on lint)
  # -----------------------------------------------------------------------

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config

      - name: cargo test
        run: cargo test --workspace --locked

  # -----------------------------------------------------------------------
  # Stage 3: Build (mainnet variant, depends on test)
  # -----------------------------------------------------------------------

  build:
    name: Build (mainnet variant)
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked

      - name: anchor build (programs)
        run: anchor build --ignore-keys

      - name: cargo build CLI (mainnet)
        run: cargo build -p antegen-cli --release --features prod --locked
