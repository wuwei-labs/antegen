name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Detect which crates have unpublished version bumps
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cron_changed: ${{ steps.check.outputs.cron_changed }}
      cron_version: ${{ steps.check.outputs.cron_version }}
      fiber_changed: ${{ steps.check.outputs.fiber_changed }}
      fiber_version: ${{ steps.check.outputs.fiber_version }}
      thread_changed: ${{ steps.check.outputs.thread_changed }}
      thread_version: ${{ steps.check.outputs.thread_version }}
      client_changed: ${{ steps.check.outputs.client_changed }}
      client_version: ${{ steps.check.outputs.client_version }}
      cli_core_changed: ${{ steps.check.outputs.cli_core_changed }}
      cli_core_version: ${{ steps.check.outputs.cli_core_version }}
      cli_changed: ${{ steps.check.outputs.cli_changed }}
      cli_version: ${{ steps.check.outputs.cli_version }}
      ctl_changed: ${{ steps.check.outputs.ctl_changed }}
      ctl_version: ${{ steps.check.outputs.ctl_version }}
      node_changed: ${{ steps.check.outputs.node_changed }}
      node_version: ${{ steps.check.outputs.node_version }}
      geyser_changed: ${{ steps.check.outputs.geyser_changed }}
      geyser_version: ${{ steps.check.outputs.geyser_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect version changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract version from a Cargo.toml
          get_version() {
            grep '^version' "$1" | head -1 | sed 's/.*"\(.*\)".*/\1/'
          }

          # Check if a version is already published on crates.io
          crate_published() {
            local name=$1 version=$2
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "User-Agent: antegen-ci (github.com/wuwei-labs/antegen)" \
              "https://crates.io/api/v1/crates/${name}/${version}")
            [ "$status" = "200" ]
          }

          # --- antegen-cron ---
          CRON_VERSION=$(get_version crates/cron/Cargo.toml)
          if crate_published antegen-cron "$CRON_VERSION"; then
            CRON_CHANGED=false
          else
            CRON_CHANGED=true
          fi
          echo "cron_version=${CRON_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cron_changed=${CRON_CHANGED}" >> "$GITHUB_OUTPUT"

          # --- antegen-fiber-program ---
          FIBER_VERSION=$(get_version programs/fiber/Cargo.toml)
          if crate_published antegen-fiber-program "$FIBER_VERSION"; then
            FIBER_CHANGED=false
          else
            FIBER_CHANGED=true
          fi
          echo "fiber_version=${FIBER_VERSION}" >> "$GITHUB_OUTPUT"
          echo "fiber_changed=${FIBER_CHANGED}" >> "$GITHUB_OUTPUT"

          # --- antegen-thread-program ---
          THREAD_VERSION=$(get_version programs/thread/Cargo.toml)
          if crate_published antegen-thread-program "$THREAD_VERSION"; then
            THREAD_CHANGED=false
          else
            THREAD_CHANGED=true
          fi
          echo "thread_version=${THREAD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "thread_changed=${THREAD_CHANGED}" >> "$GITHUB_OUTPUT"

          # --- antegen-client ---
          CLIENT_VERSION=$(get_version crates/client/Cargo.toml)
          if crate_published antegen-client "$CLIENT_VERSION"; then
            CLIENT_CHANGED=false
          else
            CLIENT_CHANGED=true
          fi
          echo "client_version=${CLIENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "client_changed=${CLIENT_CHANGED}" >> "$GITHUB_OUTPUT"

          # --- antegen-cli-core ---
          CLI_CORE_VERSION=$(get_version cli/core/Cargo.toml)
          if crate_published antegen-cli-core "$CLI_CORE_VERSION"; then
            CLI_CORE_CHANGED=false
          else
            CLI_CORE_CHANGED=true
          fi
          echo "cli_core_version=${CLI_CORE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cli_core_changed=${CLI_CORE_CHANGED}" >> "$GITHUB_OUTPUT"

          # --- antegen-cli (check GitHub release, not crates.io) ---
          CLI_VERSION=$(get_version cli/antegen/Cargo.toml)
          if gh release view "v${CLI_VERSION}" &>/dev/null; then
            CLI_CHANGED=false
          else
            CLI_CHANGED=true
          fi
          echo "cli_version=${CLI_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cli_changed=${CLI_CHANGED}" >> "$GITHUB_OUTPUT"

          # --- antegenctl (check GitHub release with ctl-v prefix) ---
          CTL_VERSION=$(get_version cli/antegenctl/Cargo.toml)
          if gh release view "ctl-v${CTL_VERSION}" &>/dev/null; then
            CTL_CHANGED=false
          else
            CTL_CHANGED=true
          fi
          echo "ctl_version=${CTL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ctl_changed=${CTL_CHANGED}" >> "$GITHUB_OUTPUT"

          # --- antegen-node (check GitHub release with node- prefix) ---
          NODE_VERSION=$(get_version crates/client/Cargo.toml)
          if gh release view "node-v${NODE_VERSION}" &>/dev/null; then
            NODE_CHANGED=false
          else
            NODE_CHANGED=true
          fi
          echo "node_version=${NODE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "node_changed=${NODE_CHANGED}" >> "$GITHUB_OUTPUT"

          # --- antegen-geyser-plugin (check GitHub release) ---
          GEYSER_VERSION=$(get_version plugin/geyser/Cargo.toml)
          if gh release view "geyser-v${GEYSER_VERSION}" &>/dev/null; then
            GEYSER_CHANGED=false
          else
            GEYSER_CHANGED=true
          fi
          echo "geyser_version=${GEYSER_VERSION}" >> "$GITHUB_OUTPUT"
          echo "geyser_changed=${GEYSER_CHANGED}" >> "$GITHUB_OUTPUT"

          # --- Summary ---
          echo "### Release Detection" >> "$GITHUB_STEP_SUMMARY"
          echo "| Crate | Version | Needs Release |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------|---------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| antegen-cron | ${CRON_VERSION} | ${CRON_CHANGED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| antegen-fiber-program | ${FIBER_VERSION} | ${FIBER_CHANGED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| antegen-thread-program | ${THREAD_VERSION} | ${THREAD_CHANGED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| antegen-client | ${CLIENT_VERSION} | ${CLIENT_CHANGED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| antegen-cli-core | ${CLI_CORE_VERSION} | ${CLI_CORE_CHANGED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| antegen-cli | ${CLI_VERSION} | ${CLI_CHANGED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| antegenctl | ${CTL_VERSION} | ${CTL_CHANGED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| antegen-node | ${NODE_VERSION} | ${NODE_CHANGED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| antegen-geyser-plugin | ${GEYSER_VERSION} | ${GEYSER_CHANGED} |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 2: Publish antegen-cron to crates.io
  # ---------------------------------------------------------------------------
  publish-cron:
    needs: detect-changes
    if: needs.detect-changes.outputs.cron_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Publish antegen-cron
        run: cargo publish -p antegen-cron --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true # May already be published

  # ---------------------------------------------------------------------------
  # Job 3: Publish antegen-fiber-program to crates.io
  # ---------------------------------------------------------------------------
  publish-fiber-program:
    needs: detect-changes
    if: needs.detect-changes.outputs.fiber_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Publish antegen-fiber-program
        run: cargo publish -p antegen-fiber-program --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true # May already be published

  # ---------------------------------------------------------------------------
  # Job 4: Publish antegen-thread-program to crates.io
  # ---------------------------------------------------------------------------
  publish-thread-program:
    needs: [detect-changes, publish-cron, publish-fiber-program]
    if: >-
      always() &&
      needs.detect-changes.outputs.thread_changed == 'true' &&
      needs.publish-cron.result != 'failure' &&
      needs.publish-fiber-program.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Wait for crates.io indexing
        if: needs.publish-cron.result == 'success' || needs.publish-fiber-program.result == 'success'
        run: sleep 30
      - name: Publish antegen-thread-program
        run: cargo publish -p antegen-thread-program --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true # May already be published

  # ---------------------------------------------------------------------------
  # Job 4: Publish antegen-client to crates.io
  # ---------------------------------------------------------------------------
  publish-client:
    needs: [detect-changes, publish-cron, publish-fiber-program, publish-thread-program]
    if: >-
      always() &&
      needs.detect-changes.outputs.client_changed == 'true' &&
      needs.publish-cron.result != 'failure' &&
      needs.publish-fiber-program.result != 'failure' &&
      needs.publish-thread-program.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Wait for crates.io indexing
        if: needs.publish-thread-program.result == 'success'
        run: sleep 30
      - name: Publish antegen-client
        run: cargo publish -p antegen-client --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true # May already be published

  # ---------------------------------------------------------------------------
  # Job 5: Publish antegen-cli-core to crates.io
  # ---------------------------------------------------------------------------
  publish-cli-core:
    needs:
      [detect-changes, publish-cron, publish-fiber-program, publish-thread-program, publish-client]
    if: >-
      always() &&
      needs.detect-changes.outputs.cli_core_changed == 'true' &&
      needs.publish-cron.result != 'failure' &&
      needs.publish-fiber-program.result != 'failure' &&
      needs.publish-thread-program.result != 'failure' &&
      needs.publish-client.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Wait for crates.io indexing
        if: needs.publish-client.result == 'success'
        run: sleep 30
      - name: Publish antegen-cli-core
        run: cargo publish -p antegen-cli-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true # May already be published

  # ---------------------------------------------------------------------------
  # Job 6: Build CLI binaries (runs in parallel with library publishing)
  # ---------------------------------------------------------------------------
  build-cli:
    needs: detect-changes
    if: needs.detect-changes.outputs.cli_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Build CLI
        env:
          CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: /opt/homebrew/opt/llvm/bin/clang
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: /opt/homebrew/opt/llvm/bin/clang
          CC_aarch64_apple_darwin: /opt/homebrew/opt/llvm/bin/clang
          CC_x86_64_apple_darwin: /opt/homebrew/opt/llvm/bin/clang
          AR_aarch64_apple_darwin: /opt/homebrew/opt/llvm/bin/llvm-ar
          AR_x86_64_apple_darwin: /opt/homebrew/opt/llvm/bin/llvm-ar
        run: cargo build -p antegen-cli --release --features prod --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/antegen \
            artifacts/antegen-v${{ needs.detect-changes.outputs.cli_version }}-${{ matrix.target }}
          chmod +x artifacts/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: artifacts/*
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 7: Create CLI GitHub release + publish to crates.io
  # ---------------------------------------------------------------------------
  release-cli:
    needs:
      [
        detect-changes,
        build-cli,
        publish-cron,
        publish-fiber-program,
        publish-thread-program,
        publish-client,
        publish-cli-core,
      ]
    if: >-
      always() &&
      needs.detect-changes.outputs.cli_changed == 'true' &&
      needs.build-cli.result == 'success' &&
      needs.publish-cron.result != 'failure' &&
      needs.publish-fiber-program.result != 'failure' &&
      needs.publish-thread-program.result != 'failure' &&
      needs.publish-client.result != 'failure' &&
      needs.publish-cli-core.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cli-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create git tag
        run: |
          git tag "v${{ needs.detect-changes.outputs.cli_version }}"
          git push origin "v${{ needs.detect-changes.outputs.cli_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-changes.outputs.cli_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
          body: |
            ## Antegen CLI v${{ needs.detect-changes.outputs.cli_version }}

            ### Installation

            **Via cargo:**
            ```bash
            cargo install antegen-cli
            ```

            **Via script:**
            ```bash
            curl -sSfL https://raw.githubusercontent.com/wuwei-labs/antegen/main/scripts/install.sh | bash
            ```

            ---
            [Documentation](https://docs.antegen.xyz) | [GitHub](https://github.com/wuwei-labs/antegen)
          files: |
            artifacts/*

      - name: Wait for crates.io indexing
        if: needs.publish-cli-core.result == 'success' || needs.publish-client.result == 'success'
        run: sleep 30

      - name: Publish antegen-cli
        run: cargo publish -p antegen-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true # May already be published

  # ---------------------------------------------------------------------------
  # Job 8: Build antegenctl binaries (runs in parallel with library publishing)
  # ---------------------------------------------------------------------------
  build-ctl:
    needs: detect-changes
    if: needs.detect-changes.outputs.ctl_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Build antegenctl
        env:
          CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: /opt/homebrew/opt/llvm/bin/clang
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: /opt/homebrew/opt/llvm/bin/clang
          CC_aarch64_apple_darwin: /opt/homebrew/opt/llvm/bin/clang
          CC_x86_64_apple_darwin: /opt/homebrew/opt/llvm/bin/clang
          AR_aarch64_apple_darwin: /opt/homebrew/opt/llvm/bin/llvm-ar
          AR_x86_64_apple_darwin: /opt/homebrew/opt/llvm/bin/llvm-ar
        run: cargo build -p antegenctl --release --features prod --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/antegenctl \
            artifacts/antegenctl-v${{ needs.detect-changes.outputs.ctl_version }}-${{ matrix.target }}
          chmod +x artifacts/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctl-${{ matrix.target }}
          path: artifacts/*
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 9: Create antegenctl GitHub release + publish to crates.io
  # ---------------------------------------------------------------------------
  release-ctl:
    needs:
      [
        detect-changes,
        build-ctl,
        publish-cron,
        publish-fiber-program,
        publish-thread-program,
        publish-client,
        publish-cli-core,
      ]
    if: >-
      always() &&
      needs.detect-changes.outputs.ctl_changed == 'true' &&
      needs.build-ctl.result == 'success' &&
      needs.publish-cron.result != 'failure' &&
      needs.publish-fiber-program.result != 'failure' &&
      needs.publish-thread-program.result != 'failure' &&
      needs.publish-client.result != 'failure' &&
      needs.publish-cli-core.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Download antegenctl artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ctl-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create git tag
        run: |
          git tag "ctl-v${{ needs.detect-changes.outputs.ctl_version }}"
          git push origin "ctl-v${{ needs.detect-changes.outputs.ctl_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ctl-v${{ needs.detect-changes.outputs.ctl_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
          body: |
            ## antegenctl v${{ needs.detect-changes.outputs.ctl_version }}

            ### Installation

            **Via cargo:**
            ```bash
            cargo install antegenctl
            ```

            ---
            [Documentation](https://docs.antegen.xyz) | [GitHub](https://github.com/wuwei-labs/antegen)
          files: |
            artifacts/*

      - name: Wait for crates.io indexing
        if: needs.publish-cli-core.result == 'success' || needs.publish-client.result == 'success'
        run: sleep 30

      - name: Publish antegenctl
        run: cargo publish -p antegenctl --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true # May already be published

  # ---------------------------------------------------------------------------
  # Job 10: Build Node binaries (runs in parallel with library publishing)
  # ---------------------------------------------------------------------------
  build-node:
    needs: detect-changes
    if: needs.detect-changes.outputs.node_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Build Node
        env:
          CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: /opt/homebrew/opt/llvm/bin/clang
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: /opt/homebrew/opt/llvm/bin/clang
          CC_aarch64_apple_darwin: /opt/homebrew/opt/llvm/bin/clang
          CC_x86_64_apple_darwin: /opt/homebrew/opt/llvm/bin/clang
          AR_aarch64_apple_darwin: /opt/homebrew/opt/llvm/bin/llvm-ar
          AR_x86_64_apple_darwin: /opt/homebrew/opt/llvm/bin/llvm-ar
        run: cargo build -p antegen-client --release --features node --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/antegen-node \
            artifacts/antegen-node-v${{ needs.detect-changes.outputs.node_version }}-${{ matrix.target }}
          chmod +x artifacts/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: artifacts/*
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 11: Create Node GitHub release
  # ---------------------------------------------------------------------------
  release-node:
    needs:
      [
        detect-changes,
        build-node,
        publish-cron,
        publish-fiber-program,
        publish-thread-program,
        publish-client,
      ]
    if: >-
      always() &&
      needs.detect-changes.outputs.node_changed == 'true' &&
      needs.build-node.result == 'success' &&
      needs.publish-cron.result != 'failure' &&
      needs.publish-fiber-program.result != 'failure' &&
      needs.publish-thread-program.result != 'failure' &&
      needs.publish-client.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Node artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: node-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create git tag
        run: |
          git tag "node-v${{ needs.detect-changes.outputs.node_version }}"
          git push origin "node-v${{ needs.detect-changes.outputs.node_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: node-v${{ needs.detect-changes.outputs.node_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
          body: |
            ## Antegen Node v${{ needs.detect-changes.outputs.node_version }}

            Executor binary for Antegen. Managed by `antegenctl`.

            ### Installation

            **Via `antegenctl`:**
            ```bash
            antegenctl install v${{ needs.detect-changes.outputs.node_version }}
            antegenctl use v${{ needs.detect-changes.outputs.node_version }}
            ```

            **Via cargo:**
            ```bash
            cargo install antegen-client --features node
            ```

            ---
            [Documentation](https://docs.antegen.xyz) | [GitHub](https://github.com/wuwei-labs/antegen)
          files: |
            artifacts/*

  # ---------------------------------------------------------------------------
  # Job 12: Build Geyser plugin binaries (runs in parallel with library publishing)
  # ---------------------------------------------------------------------------
  build-geyser:
    needs: detect-changes
    if: needs.detect-changes.outputs.geyser_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
            ext: dylib
          - os: macos-14
            target: aarch64-apple-darwin
            ext: dylib
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: so
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev pkg-config

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Build Geyser plugin
        env:
          CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: /opt/homebrew/opt/llvm/bin/clang
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: /opt/homebrew/opt/llvm/bin/clang
          CC_aarch64_apple_darwin: /opt/homebrew/opt/llvm/bin/clang
          CC_x86_64_apple_darwin: /opt/homebrew/opt/llvm/bin/clang
          AR_aarch64_apple_darwin: /opt/homebrew/opt/llvm/bin/llvm-ar
          AR_x86_64_apple_darwin: /opt/homebrew/opt/llvm/bin/llvm-ar
        run: cargo build -p antegen-geyser-plugin --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/libantegen_geyser_plugin.${{ matrix.ext }} \
            artifacts/antegen-geyser-v${{ needs.detect-changes.outputs.geyser_version }}-${{ matrix.target }}.${{ matrix.ext }}
          chmod +x artifacts/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geyser-${{ matrix.target }}
          path: artifacts/*
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 13: Create Geyser plugin GitHub release
  # ---------------------------------------------------------------------------
  release-geyser:
    needs:
      [
        detect-changes,
        build-geyser,
        publish-cron,
        publish-fiber-program,
        publish-thread-program,
        publish-client,
      ]
    if: >-
      always() &&
      needs.detect-changes.outputs.geyser_changed == 'true' &&
      needs.build-geyser.result == 'success' &&
      needs.publish-cron.result != 'failure' &&
      needs.publish-fiber-program.result != 'failure' &&
      needs.publish-thread-program.result != 'failure' &&
      needs.publish-client.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Geyser artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: geyser-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create git tag
        run: |
          git tag "geyser-v${{ needs.detect-changes.outputs.geyser_version }}"
          git push origin "geyser-v${{ needs.detect-changes.outputs.geyser_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geyser-v${{ needs.detect-changes.outputs.geyser_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
          body: |
            ## Antegen Geyser Plugin v${{ needs.detect-changes.outputs.geyser_version }}

            ---
            [Documentation](https://docs.antegen.xyz) | [GitHub](https://github.com/wuwei-labs/antegen)
          files: |
            artifacts/*
